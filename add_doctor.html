<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Doctor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h2>Add Doctor</h2>
      <a href="admin_doctors.php" class="btn btn-secondary mb-2"
        >Back to Doctors</a
      >
      <form action="add_doctor.php" method="POST" enctype="multipart/form-data">
        <input
          type="text"
          name="fullname"
          class="form-control mb-2"
          placeholder="Full Name"
          required
        />
        <input
          type="text"
          name="contact"
          class="form-control mb-2"
          placeholder="Contact"
          required
        />
        <input
          type="email"
          name="email"
          class="form-control mb-2"
          placeholder="Email"
          required
        />
        <input
          type="text"
          name="specialization"
          class="form-control mb-2"
          placeholder="Specialization"
          required
        />
        <input
          type="password"
          name="password"
          class="form-control mb-2"
          placeholder="Password"
          required
        />
        <!-- New file input for photo -->
        <label class="mb-1">Doctor Photo:</label>
        <input
          type="file"
          name="photo"
          class="form-control mb-3"
          accept="image/*"
        />
        <button type="submit" class="btn btn-success w-100">Add Doctor</button>
      </form>
    </div>
  </body>
</html>
